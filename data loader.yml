services:
  redis:
    image: redis/redis-stack-server:latest
    container_name: redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - copilot-net

  data-loader:
    # Dockerfile이 없으므로 build 대신 공식 Advanced(OCR) Data Loader 이미지 사용 (PDF Appendix 참고)
    image: public.ecr.aws/tds/data-loader-pdf-unstruct:latest
    container_name: data-loader
    restart: unless-stopped

    depends_on:
      - redis

    ports:
      - "8082:8080"

    volumes:
      - ${DOCS_DIR}:/docs

    extra_hosts:
      - "host.docker.internal:host-gateway"

    networks:
      - copilot-net

    environment:
      LOG_LEVEL: ${LOG_LEVEL}
      SECRET_KEY: ${SECRET_KEY}
      HASHED_ADMIN_PASSWORD: ${HASHED_ADMIN_PASSWORD}
      MODEL_PLUGIN_ENTRY_POINT: ${MODEL_PLUGIN_ENTRY_POINT}
      EMBEDDINGS_PLUGIN_ENTRY_POINT: ${EMBEDDINGS_PLUGIN_ENTRY_POINT}
      MODEL_NAME: ${MODEL_NAME}
      ACCESS_TOKEN_EXPIRE_DAYS: ${ACCESS_TOKEN_EXPIRE_DAYS}
      EMBEDDING_MODEL_NAME: ${EMBEDDING_MODEL_NAME}
      VECTORDB_PLUGIN_ENTRY_POINT: ${VECTORDB_PLUGIN_ENTRY_POINT}

      # Ollama
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL} # data loader 컨테이너가 LLM, Embedding 위해 Ollama 서버에 HTTP API로 요청을 보내야 하는데, 이때 주소
      # 컨테이너에서 호스트PC 11434 포트로 접근해야하므로 host.docker.internal 사용

      # VectorDB
      REDIS_URL: ${REDIS_URL}

      # Optional monitoring
      LANGCHAIN_API_KEY: ${LANGCHAIN_API_KEY}
      LANGCHAIN_TRACING_V2: ${LANGCHAIN_TRACING_V2}
      LANGCHAIN_ENDPOINT: ${LANGCHAIN_ENDPOINT}
      LANGCHAIN_PROJECT: ${LANGCHAIN_PROJECT}

# 서비스에서 참조하는 copilot-net 네트워크 정의 (없으면 "undefined network" 오류 발생)
networks:
  copilot-net:
    name: copilot-net
