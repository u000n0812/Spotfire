services:
  redis:
    # 벡터 검색(RediSearch 모듈)이 필요하므로 일반 redis 이미지가 아닌 redis-stack-server 사용
    image: redis/redis-stack-server:latest
    container_name: copilot-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - copilot-net

  data-loader:
    # 공식 unstruct 이미지에 redis 라이브러리를 추가한 커스텀 이미지 (Dockerfile 참고)
    # 실행: docker compose up -d --build
    build: .
    image: copilot-data-loader-ocr-redis:local
    container_name: copilot-data-loader
    restart: unless-stopped
    depends_on:
      - redis
    ports:
      - "8082:8080"
    volumes:
      # 호스트의 PDF 문서 폴더를 컨테이너 내부 /docs 로 마운트
      - "${DOCS_DIR}:/docs"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - copilot-net
    environment:
      LOG_LEVEL: ${LOG_LEVEL}
      SECRET_KEY: ${SECRET_KEY}
      HASHED_ADMIN_PASSWORD: ${HASHED_ADMIN_PASSWORD}
      ACCESS_TOKEN_EXPIRE_DAYS: ${ACCESS_TOKEN_EXPIRE_DAYS}

      # plugins
      VECTORDB_PLUGIN_ENTRY_POINT: ${VECTORDB_PLUGIN_ENTRY_POINT}
      MODEL_PLUGIN_ENTRY_POINT: ${MODEL_PLUGIN_ENTRY_POINT}
      EMBEDDINGS_PLUGIN_ENTRY_POINT: ${EMBEDDINGS_PLUGIN_ENTRY_POINT}

      # models
      MODEL_NAME: ${MODEL_NAME}
      EMBEDDING_MODEL_NAME: ${EMBEDDING_MODEL_NAME}

      # Ollama (컨테이너에서 호스트 PC의 Ollama 접근)
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL}

      # VectorDB (같은 네트워크의 redis 서비스명으로 접근)
      REDIS_URL: ${REDIS_URL}

  orchestrator:
    image: public.ecr.aws/tds/llm-orchestrator:latest
    container_name: copilot-orchestrator
    restart: unless-stopped
    depends_on:
      - redis
    ports:
      - "8081:8080"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - copilot-net
    environment:
      LOG_LEVEL: ${LOG_LEVEL}
      SECRET_KEY: ${SECRET_KEY}
      HASHED_ADMIN_PASSWORD: ${HASHED_ADMIN_PASSWORD}
      ACCESS_TOKEN_EXPIRE_DAYS: ${ACCESS_TOKEN_EXPIRE_DAYS}

      # plugins
      RETRIEVER_PLUGIN_ENTRY_POINT: ${RETRIEVER_PLUGIN_ENTRY_POINT}
      MODEL_PLUGIN_ENTRY_POINT: ${MODEL_PLUGIN_ENTRY_POINT}
      SECONDARY_MODEL_PLUGIN_ENTRY_POINT: ${SECONDARY_MODEL_PLUGIN_ENTRY_POINT}
      EMBEDDINGS_PLUGIN_ENTRY_POINT: ${EMBEDDINGS_PLUGIN_ENTRY_POINT}

      # models
      MULTI_MODAL_MODEL_NAME: ${MULTI_MODAL_MODEL_NAME}
      COMPLETIONS_MODEL_NAME: ${COMPLETIONS_MODEL_NAME}
      CHAT_SIMPLE_MODEL_NAME: ${CHAT_SIMPLE_MODEL_NAME}
      CHAT_COMPLEX_MODEL_NAME: ${CHAT_COMPLEX_MODEL_NAME}
      EMBEDDING_MODEL_NAME: ${EMBEDDING_MODEL_NAME}

      # Ollama
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL}

      # VectorDB
      REDIS_URL: ${REDIS_URL}

      # Optional monitoring (Langsmith)
      # 빈 값이 들어가면 "LangSmith API URL cannot be empty" 오류로 컨테이너가 죽으므로 기본 URL 지정
      LANGCHAIN_API_KEY: ${LANGCHAIN_API_KEY}
      LANGCHAIN_TRACING_V2: ${LANGCHAIN_TRACING_V2:-false}
      LANGCHAIN_ENDPOINT: ${LANGCHAIN_ENDPOINT:-https://api.smith.langchain.com}
      LANGCHAIN_PROJECT: ${LANGCHAIN_PROJECT}

networks:
  copilot-net:
    name: copilot-net
